{% load static %}
<!-- 
  Plantilla: password_reset_complete.html
  Descripción: Pantalla final informativa que confirma que el cambio de contraseña ha sido exitoso
  y proporciona un enlace para iniciar sesión.
  Sigue la paleta de colores del proyecto: Blanco para tarjeta, Azul Marino (#03152d) para el encabezado
  y el botón de acción principal de inicio de sesión, y detalles en Naranja (#ff8c32).
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Restablecida - Sistema de Reportes</title>
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            position: relative;
            z-index: 1;
            padding: 40px 20px;
            background-color: #eef2f6; /* Fondo azul claro */
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(3, 21, 45, 0.1), rgba(3, 21, 45, 0.1)), url("{% static 'light_palette_wave_background.png' %}") no-repeat center/cover;
            z-index: -1;
            pointer-events: none;
        }

        /* Tarjeta principal blanca */
        .complete-card {
            width: 100%;
            max-width: 500px;
            background: #ffffff; /* Contenedor blanco limpio */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(3, 21, 45, 0.12);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .complete-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(3, 21, 45, 0.18);
        }

        /* Encabezado Azul Marino con borde Naranja */
        .complete-header {
            background: #03152d;
            color: #ffffff;
            padding: 35px 20px;
            text-align: center;
            border-bottom: 4px solid #ff8c32;
        }

        .complete-header i {
            font-size: 3rem;
            color: #ff8c32; /* Naranja destacado */
            margin-bottom: 10px;
            display: inline-block;
        }

        .complete-header h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* Cuerpo */
        .complete-body {
            padding: 40px 30px;
            text-align: center;
        }

        .success-icon-container {
            font-size: 4rem;
            color: #10b981; /* Verde esmeralda para el éxito */
            margin-bottom: 20px;
            line-height: 1;
        }

        .info-text {
            color: #4a5568;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Botón de acción Azul Marino estructurado solicitado */
        .btn-login {
            display: inline-block;
            width: 100%;
            background: #03152d; /* Azul Marino */
            color: #ffffff;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(3, 21, 45, 0.25);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #ff8c32; /* Cambia a naranja destacado al hover */
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(255, 140, 50, 0.35);
        }

        .btn-login:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="complete-card">
        <!-- Encabezado de la Tarjeta (Azul Marino con borde Naranja) -->
        <div class="complete-header">
            <i class="bi bi-shield-fill-check"></i>
            <h2>¡Todo Listo!</h2>
        </div>

        <div class="complete-body">
            <!-- Icono verde de confirmación exitosa -->
            <div class="success-icon-container">
                <i class="bi bi-check-circle-fill"></i>
            </div>

            <p class="info-text">
                Tu contraseña ha sido restablecida y cambiada de forma segura en la base de datos. Ya puedes iniciar sesión en la plataforma utilizando tus nuevas credenciales de acceso.
            </p>

            <!-- Botón estructurado en Azul Marino -->
            <a href="{% url 'login' %}" class="btn-login">
                Iniciar sesión ahora
            </a>
        </div>
    </div>

</body>
</html>
