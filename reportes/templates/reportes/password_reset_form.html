{% load static %}
<!-- 
  Plantilla: password_reset_form.html
  Descripción: Formulario para ingresar el correo y solicitar el enlace de restablecimiento de contraseña.
  Sigue la paleta de colores del proyecto: Blanco para tarjeta, Naranja (#ff8c32) para el botón de acción
  y detalles/textos en Azul Marino (#03152d).
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Sistema de Reportes</title>
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            position: relative;
            z-index: 1;
            padding: 40px 20px;
            background-color: #eef2f6; /* Fondo azul claro */
        }

        /* Fondo decorativo con ondas usando el recurso estático del proyecto */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(3, 21, 45, 0.1), rgba(3, 21, 45, 0.1)), url("{% static 'light_palette_wave_background.png' %}") no-repeat center/cover;
            z-index: -1;
            pointer-events: none;
        }

        /* Tarjeta principal (Blanca con bordes suaves) */
        .reset-card {
            width: 100%;
            max-width: 480px;
            background: #ffffff; /* Contenedor blanco limpio */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(3, 21, 45, 0.12); /* Sombra suave con tinte azul marino */
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .reset-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(3, 21, 45, 0.18);
        }

        /* Encabezado con fondo Azul Marino y letras blancas */
        .reset-header {
            background: #03152d; /* Azul Marino principal */
            color: #ffffff;
            padding: 35px 20px;
            text-align: center;
            border-bottom: 4px solid #ff8c32; /* Detalle Naranja */
        }

        .reset-header i {
            font-size: 3rem;
            color: #ff8c32; /* Detalle Naranja */
            margin-bottom: 10px;
            display: inline-block;
        }

        .reset-header h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* Cuerpo de la tarjeta */
        .reset-body {
            padding: 40px 30px;
        }

        .info-text {
            color: #4a5568;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
            text-align: center;
        }

        label {
            display: block;
            color: #03152d; /* Azul Marino */
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .email-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            outline: none;
            color: #03152d;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .email-input:focus {
            border-color: #03152d;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(3, 21, 45, 0.1);
        }

        /* Botón de acción Naranja destacado */
        .btn-reset {
            width: 100%;
            background: #ff8c32; /* Naranja destacado */
            color: #ffffff;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(255, 140, 50, 0.3);
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #e0721b;
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(255, 140, 50, 0.45);
        }

        /* Enlaces secundarios */
        .secondary-links {
            margin-top: 25px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .secondary-links a {
            color: #03152d;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .secondary-links a:hover {
            color: #ff8c32;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <!-- Encabezado de la Tarjeta (Azul Marino con borde Naranja) -->
        <div class="reset-header">
            <i class="bi bi-shield-lock-fill"></i>
            <h2>¿Olvidaste tu contraseña?</h2>
        </div>

        <div class="reset-body">
            <p class="info-text">
                Ingresa tu correo electrónico registrado y te enviaremos un enlace seguro para que puedas restablecer tu contraseña de inmediato.
            </p>

            <!-- Formulario nativo de Django para resetear contraseña -->
            <form method="POST" action="{% url 'password_reset' %}">
                {% csrf_token %}
                
                <div>
                    <label for="id_email">Correo electrónico</label>
                    <input type="email" name="email" id="id_email" class="email-input" 
                           placeholder="ejemplo@correo.com" autocomplete="email" required>
                </div>

                <!-- Botón naranja destacado -->
                <button type="submit" class="btn-reset">
                    Enviar enlace de recuperación
                </button>
            </form>

            <div class="secondary-links">
                <a href="{% url 'login' %}">
                    <i class="bi bi-arrow-left me-1"></i>Regresar al inicio de sesión
                </a>
            </div>
        </div>
    </div>

</body>
</html>
