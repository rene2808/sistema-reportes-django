<!-- 
  Plantilla: editar_perfil.html
  Descripción: Vista del formulario para actualizar la información personal de la cuenta del usuario
  (nombre de usuario, correo, contraseña, nombre completo, teléfono).
-->
{% extends 'reportes/base.html' %}

{% block title %}Editar Perfil{% endblock %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #60a5fa 0%, #dbeafe 50%, #6ee7b7 100%) !important;
    }

    .profile-edit-page {
        max-width: 560px;
        margin: 0 auto;
    }

    .profile-edit-page .page-title,
    .profile-edit-page .page-subtitle {
        text-align: center;
    }

    .profile-edit-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        max-width: 560px;
        padding: 45px 40px;
        border-radius: 24px;
        border: 2px solid rgba(59, 130, 246, 0.25);
        border-top: 6px solid #3B82F6 !important;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
    }

    .profile-edit-card label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 800;
        color: #64748b;
        margin-bottom: 8px;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 1px;
    }

    .profile-edit-card input {
        width: 100%;
        padding: 13px;
        border: 1.5px solid #94a3b8;
        border-radius: 12px;
        margin-bottom: 18px;
        font-size: 15px;
        outline: none;
        background: white;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .profile-edit-card input:focus {
        border-color: #3B82F6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .profile-edit-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 25px;
    }

    .btn-save-profile {
        background: linear-gradient(135deg, #ff7417 0%, #ff5500 100%);
        color: white;
        border: none;
        padding: 13px 28px;
        border-radius: 12px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(255, 116, 23, 0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-save-profile:hover {
        background: linear-gradient(135deg, #ea650d 0%, #d84500 100%);
        box-shadow: 0 12px 24px rgba(255, 116, 23, 0.35);
        transform: translateY(-2px);
    }

    .btn-cancel {
        background: white;
        color: #334155;
        border: 1px solid #d6dde7;
        padding: 13px 28px;
        border-radius: 12px;
        font-weight: 800;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-cancel:hover {
        background: #f8fafc;
        transform: translateY(-2px);
    }
</style>

<div class="profile-edit-page">
    <h1 class="page-title">Editar Perfil</h1>
    <div class="page-subtitle">Actualiza tu información personal</div>

    <div class="profile-edit-card">
        <form method="POST" action="{% url 'editar_perfil' %}">
            {% csrf_token %}

            <label>
                <i class="bi bi-person-badge-fill" style="color: #3b82f6; font-size: 1.1rem;"></i>
                <span>Nombre de usuario</span>
            </label>
            <input type="text" name="username" value="{{ user.username }}" required>

            <label>
                <i class="bi bi-person-fill" style="color: #3b82f6; font-size: 1.1rem;"></i>
                <span>Nombre</span>
            </label>
            <input type="text" name="first_name" value="{{ user.first_name }}" required>

            <label>
                <i class="bi bi-person" style="color: #3b82f6; font-size: 1.1rem;"></i>
                <span>Apellido</span>
            </label>
            <input type="text" name="last_name" value="{{ user.last_name }}" required>

            <label>
                <i class="bi bi-envelope-fill" style="color: #3b82f6; font-size: 1.1rem;"></i>
                <span>Correo electrónico</span>
            </label>
            <input type="email" name="email" value="{{ user.email }}">

            <label>
                <i class="bi bi-telephone-fill" style="color: #3b82f6; font-size: 1.1rem;"></i>
                <span>Teléfono</span>
            </label>
            <input type="text" name="telefono" value="{{ perfil.telefono|default:'' }}"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="10">

            <label>
                <i class="bi bi-key-fill" style="color: #3b82f6; font-size: 1.1rem;"></i>
                <span>Nueva contraseña</span>
            </label>
            <input type="password" name="password" placeholder="Déjalo vacío si no quieres cambiarla">

            <div class="profile-edit-actions">
                <button class="btn-save-profile" type="submit">
                    Guardar cambios
                </button>

                <a class="btn-cancel" href="{% url 'perfil' %}">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
